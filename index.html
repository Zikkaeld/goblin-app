<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>WhoU 🎲</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!--
      Font choices verified for full Ukrainian Cyrillic glyph coverage (і/ї/є/ґ) —
      see commit notes. Silkscreen and Pixelify Sans were dropped: Silkscreen has no
      cyrillic subset at all, and Pixelify Sans claims one but ships broken glyphs
      (д/ґ/ь render as wrong Latin look-alikes). VT323 also lacks cyrillic — kept
      only for pure-digit counters that never contain Cyrillic text.
    -->
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@400;500;600;700&family=VT323&display=swap"
      rel="stylesheet"
    />

    <meta name="theme-color" content="#2a1c10" />
    <meta name="description" content="Соціальний рандомайзер персонажів — кімнати, спільні стріки, колекція результатів" />

    <!-- iOS PWA support: no native manifest support, so these tags are required separately -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="WhoU" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
